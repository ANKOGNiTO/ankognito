<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKOGNiTO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Inter", system-ui, Arial, sans-serif;
  background: #050505;
  color: #eaeaea;
  overflow-x: hidden;
}

#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.smoke {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(179,0,255,0.15), transparent 60%);
  filter: blur(90px);
  z-index: 1;
}

header {
  text-align: center;
  padding: 60px 20px;
  background: radial-gradient(circle, #1a1a1a, #000);
  border-bottom: 2px solid #b300ff;
  position: relative;
  z-index: 2;
}

.glitch {
  font-size: clamp(40px, 6vw, 80px);
  letter-spacing: 0.35em;
  font-weight: 600;
  color: #b300ff;
  text-shadow: 0 0 30px #b300ff;
}

section {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
  position: relative;
  z-index: 2;
}

.track {
  background: rgba(20,20,20,0.75);
  padding: 18px;
  margin-bottom: 18px;
  border-left: 3px solid #b300ff;
}

.track.active {
  box-shadow: 0 0 25px #b300ff;
}

.artist {
  font-weight: 600;
  color: #b300ff;
}

.title {
  font-size: 14px;
  margin-top: 4px;
}

.player {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
}

button {
  background: transparent;
  border: 1px solid #b300ff;
  color: #b300ff;
  padding: 6px 10px;
  cursor: pointer;
}

.progress {
  flex: 1;
  height: 10px;
  background: #1a1a1a;
  cursor: pointer;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#b300ff,#ff00ff);
}

.volume {
  width: 80px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="smoke"></div>

<header>
  <h1 class="glitch">ANKOGNiTO</h1>
  <p>Dark Rock Project</p>
</header>

<section>
  <h2>Music</h2>
  <div id="list"></div>
</section>

<script>

const tracks = [
"ANKOGNiTO - Traff",
"ANKOGNiTO - Glasshouse",
"ANKOGNiTO - Bring",
"ANKOGNiTO - Glow",
"ANKOGNiTO - Bonvitess",
"ANKOGNiTO - Anarchie",
"ANKOGNiTO - Reflection",
"ANKOGNiTO - KinoTape",
"ANKOGNiTO - Abstinenz",
"ANKOGNiTO - Echoes of Winter",
"ANKOGNiTO - Moondless",
"ANKOGNiTO - NewDay",
"ANKOGNiTO - No pain",
"ANKOGNiTO - Spring"
];

const list = document.getElementById("list");

const base =
  location.hostname.includes("github.io")
    ? "/ankognito"
    : "";

let current = null;
let currentIndex = -1;

function render(){
  list.innerHTML = "";

  tracks.forEach((name,i)=>{
    const title = name.replace("ANKOGNiTO - ","");

    list.innerHTML += `
    <div class="track" data-index="${i}">
      <div class="artist">ANKOGNiTO</div>
      <div class="title">${title}</div>

      <audio src="${base}/music/${name}.mp3"></audio>

      <div class="player">
        <button onclick="toggle(this)">Play</button>

        <div class="progress" onclick="seek(event,this)">
          <div class="bar"></div>
        </div>

        <input class="volume" type="range" min="0" max="1" step="0.01"
        oninput="setVolume(this)" value="0.8">
      </div>
    </div>`;
  });
}

function toggle(btn){
  const track = btn.closest(".track");
  const audio = track.querySelector("audio");
  const index = Number(track.dataset.index);

  document.querySelectorAll(".track").forEach(t=>{
    t.classList.remove("active");
    t.querySelector("button").innerText="Play";
  });

  if(current && current!==audio){
    current.pause();
    current.currentTime=0;
  }

  if(audio.paused){
    audio.play();
    btn.innerText="Pause";
    track.classList.add("active");

    current=audio;
    currentIndex=index;

    audio.onended=()=>playNext();
  } else {
    audio.pause();
  }

  audio.ontimeupdate=()=>{
    if(audio.duration){
      track.querySelector(".bar").style.width =
        (audio.currentTime/audio.duration)*100+"%";
    }
  };
}

function playNext(){
  const next = document.querySelector(`.track[data-index="${currentIndex+1}"]`);
  if(next) next.querySelector("button").click();
}

function seek(e,el){
  const audio = el.closest(".track").querySelector("audio");
  const rect = el.getBoundingClientRect();
  const p = (e.clientX-rect.left)/rect.width;
  if(audio.duration){
    audio.currentTime=p*audio.duration;
  }
}

function setVolume(slider){
  const audio = slider.closest(".track").querySelector("audio");
  audio.volume=slider.value;
}

/* particles */
const c=document.getElementById("particles");
const ctx=c.getContext("2d");

let w,h;
function resize(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const f=[];
for(let i=0;i<120;i++){
  f.push({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*2,
    s:Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,w,h);

  f.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle="#b300ff";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y+=p.s;
    if(p.y>h)p.y=0;
  });

  requestAnimationFrame(draw);
}
draw();

render();

</script>

</body>
</html>
