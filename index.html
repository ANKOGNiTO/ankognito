<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKOGNiTO</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#050505;
  color:#eaeaea;
}

header{
  text-align:center;
  padding:40px;
  border-bottom:2px solid #b300ff;
}

h1{
  color:#b300ff;
  letter-spacing:0.3em;
}

section{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.track{
  background:#111;
  padding:15px;
  margin:10px 0;
  border-left:3px solid #b300ff;
}

.artist{
  color:#b300ff;
  font-weight:bold;
}

.player{
  display:flex;
  gap:10px;
  align-items:center;
  margin-top:10px;
}

button{
  background:none;
  border:1px solid #b300ff;
  color:#b300ff;
  cursor:pointer;
}

.progress{
  flex:1;
  height:10px;
  background:#222;
  cursor:pointer;
}

.bar{
  height:100%;
  width:0%;
  background:#b300ff;
}

.volume{
  width:80px;
}
</style>
</head>

<body>

<header>
  <h1>ANKOGNiTO</h1>
  <p>Music Project</p>
</header>

<section>
  <div id="list"></div>
</section>

<script>

const tracks = [
"ANKOGNiTO - Traff",
"ANKOGNiTO - Glasshouse",
"ANKOGNiTO - Bring",
"ANKOGNiTO - Glow",
"ANKOGNiTO - Bonvitess",
"ANKOGNiTO - Anarchie",
"ANKOGNiTO - Reflection",
"ANKOGNiTO - KinoTape",
"ANKOGNiTO - Abstinenz",
"ANKOGNiTO - Echoes of Winter",
"ANKOGNiTO - Moondless",
"ANKOGNiTO - NewDay",
"ANKOGNiTO - No pain",
"ANKOGNiTO - Spring"
];

const list = document.getElementById("list");

let current = null;
let currentIndex = -1;

function render(){

  list.innerHTML = "";

  tracks.forEach((name,i)=>{

    const title = name.replace("ANKOGNiTO - ","");

    list.innerHTML += `
      <div class="track" data-index="${i}">
        <div class="artist">ANKOGNiTO</div>
        <div>${title}</div>

        <!-- 💥 ВАЖНО: БЕЗ base, БЕЗ /ankognito -->
        <audio src="music/${name}.mp3"></audio>

        <div class="player">
          <button onclick="toggle(this)">Play</button>

          <div class="progress" onclick="seek(event,this)">
            <div class="bar"></div>
          </div>

          <input type="range" min="0" max="1" step="0.01"
                 value="0.8" oninput="volume(this)">
        </div>
      </div>
    `;
  });
}

function toggle(btn){

  const track = btn.closest(".track");
  const audio = track.querySelector("audio");
  const index = Number(track.dataset.index);

  document.querySelectorAll(".track").forEach(t=>{
    t.classList.remove("active");
    t.querySelector("button").innerText="Play";
  });

  if(current && current !== audio){
    current.pause();
    current.currentTime = 0;
  }

  if(audio.paused){
    audio.play();
    btn.innerText="Pause";

    current = audio;
    currentIndex = index;

    audio.onended = ()=>next();
  } else {
    audio.pause();
    btn.innerText="Play";
  }

  audio.ontimeupdate = ()=>{
    if(audio.duration){
      track.querySelector(".bar").style.width =
        (audio.currentTime/audio.duration)*100+"%";
    }
  };
}

function next(){
  const el = document.querySelector(`.track[data-index="${currentIndex+1}"]`);
  if(el) el.querySelector("button").click();
}

function seek(e,el){
  const audio = el.closest(".track").querySelector("audio");
  const rect = el.getBoundingClientRect();

  const percent = (e.clientX - rect.left) / rect.width;
  if(audio.duration){
    audio.currentTime = percent * audio.duration;
  }
}

function volume(slider){
  const audio = slider.closest(".track").querySelector("audio");
  audio.volume = slider.value;
}

render();

</script>

</body>
</html>
